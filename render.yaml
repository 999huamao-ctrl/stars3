services:
  - type: web
    name: stars3
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: stars3-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://stars3.onrender.com
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: stars3-db
    plan: free
    databaseName: stars3
    user: stars3_user
